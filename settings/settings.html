<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Line Localization Machine - Settings</title>
    <link rel="icon" type="image/png" href="../assets/icon-32.png" />
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-left">
          <img src="../assets/icon-48.png" alt="" class="header-icon" />
          <h1>Line Localization Machine</h1>
        </div>
      </header>

      <div id="status" class="status"></div>

      <main>
        <!-- Connection -->
        <section class="section">
          <h2>Connection</h2>
          <div class="form-group">
            <label for="provider">Provider</label>
            <select id="provider">
              <!-- Populated by settings.js -->
            </select>
          </div>

          <div class="form-group" id="customEndpointSection" style="display: none">
            <label for="apiEndpoint">Endpoint</label>
            <input type="url" id="apiEndpoint" placeholder="https://api.openai.com/v1" />
            <small>OpenAI-compatible API endpoint</small>
          </div>

          <div class="form-group">
            <label for="apiKey">API Key</label>
            <div class="input-with-toggle">
              <input type="password" id="apiKey" placeholder="sk-..." />
              <button type="button" id="toggleApiKey" class="btn-toggle" title="Show API key">
                <span class="toggle-icon">&#x25C9;</span>
              </button>
            </div>
            <small>Stored locally, never shared</small>
          </div>

          <div class="form-group">
            <button id="testConnection" class="btn-secondary">Test Connection</button>
          </div>
        </section>

        <!-- Model & Language -->
        <section class="section">
          <h2>Model & Language</h2>
          <div class="form-row">
            <div class="form-group">
              <label for="model">Model</label>
              <select id="model">
                <option value="custom">Custom Model...</option>
              </select>
            </div>
            <div class="form-group">
              <label for="targetLanguage">Language</label>
              <select id="targetLanguage">
                <option value="spanish">Spanish</option>
                <option value="french">French</option>
                <option value="german">German</option>
                <option value="chinese">Chinese (Simplified)</option>
                <option value="chinese-traditional">Chinese (Traditional)</option>
                <option value="japanese">Japanese</option>
                <option value="korean">Korean</option>
                <option value="portuguese">Portuguese</option>
                <option value="italian">Italian</option>
                <option value="russian">Russian</option>
                <option value="arabic">Arabic</option>
                <option value="hindi">Hindi</option>
                <option value="dutch">Dutch</option>
                <option value="swedish">Swedish</option>
                <option value="norwegian">Norwegian</option>
              </select>
            </div>
          </div>

          <div class="form-group" id="customModelSection" style="display: none">
            <label for="customModel">Custom Model ID</label>
            <input type="text" id="customModel" placeholder="e.g., gpt-4-1106-preview" />
            <small>Exact model identifier from your provider</small>
          </div>

          <div class="form-group">
            <label for="reasoningEffort">Reasoning Effort</label>
            <select id="reasoningEffort">
              <option value="off">Off (Default)</option>
              <option value="none">None</option>
              <option value="minimal">Minimal</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
            <small>Thinking depth for reasoning models (o1/o3)</small>
          </div>
        </section>
      </main>

      <footer class="actions-bar">
        <button id="resetSettings" class="btn-danger">Reset to Defaults</button>
        <button id="saveSettings" class="btn-primary">Save Settings</button>
      </footer>
    </div>

    <script type="module" src="settings.js"></script>
  </body>
</html>
