<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Translation History — Line Localization Machine</title>
    <link rel="icon" type="image/png" href="../assets/icon-32.png" />
    <link rel="stylesheet" href="history.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-left">
          <img src="../assets/icon-48.png" alt="" class="header-icon" />
          <h1>Line Localization Machine</h1>
        </div>
        <p class="header-sub">Translation History</p>
      </header>

      <main>
        <section class="section" id="historySection">
          <h2>Cached Translations</h2>
          <div id="historyTable"></div>
        </section>
      </main>

      <footer class="actions-bar">
        <button id="clearAll" class="btn-danger">Clear All History</button>
      </footer>
    </div>

    <div class="modal-overlay" id="previewOverlay">
      <div class="modal-dialog">
        <div class="modal-header">
          <h3 class="modal-title" id="previewTitle"></h3>
          <button class="modal-close" id="previewClose">&times;</button>
        </div>
        <div class="modal-body" id="previewBody"></div>
      </div>
    </div>

    <script src="../shared/cache-db.js"></script>
    <script src="history.js"></script>
  </body>
</html>
